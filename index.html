<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChickenChain · 老鹰抓小鸡</title>
  <style>
    /* ── 基础重置 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1f2e;
      color: #e8eaf0;
      font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei",
                   "Hiragino Sans GB", sans-serif;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    /* ── 最外层容器居中 ── */
    .page-wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── 标题区 ── */
    .site-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .site-header h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #f5c842;
      text-shadow: 0 2px 16px rgba(245,200,66,0.35);
    }
    .site-header .subtitle {
      margin-top: 6px;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      color: #9aa0b8;
      letter-spacing: 0.03em;
    }

    /* ── 移动端警告横幅 ── */
    #mobile-warning {
      display: none;
      background: #c0392b;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* ── 游戏容器 ── */
    #game-wrap {
      position: relative;
      width: 100%;
      max-width: 960px;
      margin: 0 auto 24px;
      background: #0d1117;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* 16:9 响应式 canvas */
    #game-wrap::before {
      content: "";
      display: block;
      padding-top: 56.25%; /* 9/16 */
    }

    #unity-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
    }

    /* ── 加载进度条 ── */
    #unity-loading-bar {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      max-width: 360px;
      text-align: center;
    }
    .loading-label {
      font-size: 0.9rem;
      color: #9aa0b8;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    #unity-progress-bar-empty {
      width: 100%;
      height: 8px;
      background: #2a3048;
      border-radius: 4px;
      overflow: hidden;
    }
    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #f5c842, #e67e22);
      border-radius: 4px;
      transition: width 0.2s ease;
    }

    /* ── 加载错误提示 ── */
    #unity-error {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      background: #2d1515;
      border: 1px solid #8b2020;
      border-radius: 8px;
      padding: 20px;
      color: #f0a0a0;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    #unity-error strong { display: block; margin-bottom: 8px; font-size: 1rem; color: #e05555; }

    /* ── 全屏按钮区 ── */
    .game-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 8px 12px;
      background: #141824;
    }
    #fullscreen-btn {
      background: #2a3048;
      border: 1px solid #3d4a6a;
      color: #c8ccdc;
      font-size: 0.85rem;
      font-family: inherit;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #fullscreen-btn:hover { background: #3a4565; }

    /* ── 教程区 ── */
    .tutorial-section {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 620px) {
      .tutorial-section { grid-template-columns: 1fr; }
    }

    .tutorial-card {
      background: #212840;
      border: 1px solid #2e3a58;
      border-radius: 12px;
      padding: 20px 22px;
    }
    .tutorial-card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f5c842;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tutorial-card ul {
      list-style: none;
      padding: 0;
    }
    .tutorial-card ul li {
      font-size: 1rem;
      color: #c8ccdc;
      line-height: 1.7;
      padding-left: 1.2em;
      position: relative;
    }
    .tutorial-card ul li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: #f5c842;
      font-weight: bold;
    }
    .tutorial-card .key-row {
      font-size: 1rem;
      color: #c8ccdc;
      line-height: 1.9;
    }
    kbd {
      display: inline-block;
      background: #2e3a58;
      border: 1px solid #4a5878;
      border-radius: 5px;
      padding: 1px 7px;
      font-size: 0.88rem;
      font-family: inherit;
      color: #e8eaf0;
      line-height: 1.5;
    }
    .tip-note {
      margin-top: 12px;
      font-size: 0.88rem;
      color: #7a82a0;
      line-height: 1.5;
    }

    /* ── 页脚 ── */
    .site-footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.8rem;
      color: #4a5068;
    }
  </style>
</head>
<body>
  <div class="page-wrap">

    <!-- 标题 -->
    <header class="site-header">
      <h1>老鹰抓小鸡</h1>
      <p class="subtitle">物理鸡链派对游戏 · 原型试玩</p>
    </header>

    <!-- 移动端警告（JS 检测后显示） -->
    <div id="mobile-warning">
      📵 本游戏需要键盘，请在电脑浏览器打开
    </div>

    <!-- 游戏画面 + 加载条 -->
    <div id="game-wrap">
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div class="loading-label">加载中，请稍候…</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-error">
        <strong>加载失败</strong>
        <span id="unity-error-msg"></span>
      </div>
    </div>

    <!-- 全屏按钮 -->
    <div style="max-width:960px; margin:0 auto;">
      <div class="game-footer">
        <button id="fullscreen-btn">⛶ 全屏</button>
      </div>
    </div>

    <!-- 教程区 -->
    <section class="tutorial-section">
      <div class="tutorial-card">
        <h2>🎮 怎么玩</h2>
        <ul>
          <li>你是<strong>老鹰（红色）</strong></li>
          <li><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或方向键移动</li>
          <li><kbd>空格</kbd> 扑击——<strong>只有扑击中碰到小鸡才算抓到</strong>，贴着蹭不算</li>
          <li>90 秒内抓住 3 只 → 老鹰赢</li>
          <li>鸡群守到时间结束 → 鸡群赢</li>
        </ul>
      </div>

      <div class="tutorial-card">
        <h2>⌨️ 按键</h2>
        <div class="key-row"><kbd>R</kbd> 重开一局</div>
        <div class="key-row"><kbd>Tab</kbd> 打开调参面板</div>
        <p class="tip-note">
          💡 小提示：先点一下游戏画面再按键——浏览器需要键盘焦点才能接收输入。
        </p>
      </div>
    </section>

    <!-- 页脚 -->
    <footer class="site-footer">
      版本 r5.2-202606112042 · Made with Unity
    </footer>

  </div><!-- /.page-wrap -->

  <script>
    // ── 移动端检测 ──
    var isMobile = (function () {
      var touch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      var ua = /iPhone|iPad|iPod|Android|Mobile/i.test(navigator.userAgent);
      return touch || ua;
    })();
    if (isMobile) {
      document.getElementById('mobile-warning').style.display = 'block';
    }

    // ── Unity 配置 ──
    // 版本号追加到所有资源 URL，每次发版缓存强制失效
    var ver   = "r5.2-202606112042";
    var build = "Build";
    var loaderUrl = build + "/WebGL.loader.js?v=" + ver;

    var config = {
      arguments: [],
      dataUrl:      build + "/WebGL.data.unityweb?v=" + ver,
      frameworkUrl: build + "/WebGL.framework.js.unityweb?v=" + ver,
      codeUrl:      build + "/WebGL.wasm.unityweb?v=" + ver,
      streamingAssetsUrl: "StreamingAssets",
      companyName:    "Max",
      productName:    "ChickenChain",
      productVersion: ver,
      showBanner: function (msg, type) {
        // 错误永久显示在错误区；警告短暂 console
        if (type === 'error') {
          var errBox = document.getElementById('unity-error');
          document.getElementById('unity-error-msg').textContent = msg;
          errBox.style.display = 'block';
          document.getElementById('unity-loading-bar').style.display = 'none';
        } else {
          console.warn('[Unity banner]', msg);
        }
      },
    };

    // ── 启动加载 ──
    var loadingBar = document.getElementById('unity-loading-bar');
    var progressBar = document.getElementById('unity-progress-bar-full');
    loadingBar.style.display = 'block';

    var script = document.createElement('script');
    script.src = loaderUrl;
    script.onload = function () {
      createUnityInstance(document.getElementById('unity-canvas'), config, function (progress) {
        progressBar.style.width = (100 * progress) + '%';
      }).then(function (unityInstance) {
        loadingBar.style.display = 'none';
        document.getElementById('fullscreen-btn').onclick = function () {
          unityInstance.SetFullscreen(1);
        };
      }).catch(function (message) {
        // 加载失败：显示在页面上，不弹 alert
        loadingBar.style.display = 'none';
        var errBox = document.getElementById('unity-error');
        document.getElementById('unity-error-msg').textContent = message;
        errBox.style.display = 'block';
        console.error('[Unity load error]', message);
      });
    };
    script.onerror = function () {
      loadingBar.style.display = 'none';
      var errBox = document.getElementById('unity-error');
      document.getElementById('unity-error-msg').textContent =
        '无法加载游戏脚本，请检查网络或刷新页面重试。（loader: ' + loaderUrl + '）';
      errBox.style.display = 'block';
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
